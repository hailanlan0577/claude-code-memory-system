services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-memory
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant-data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: neo4j-memory
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j-data:/data
    environment:
      - NEO4J_AUTH=neo4j/YOUR_NEO4J_PASSWORD
      - NEO4J_PLUGINS=["apoc"]
    restart: unless-stopped
